    <!-- Preload the LCP image (hero headshot). Uses imagesrcset/imagesizes so
         the preload scanner fetches the SAME responsive variant the <img>
         picks (400w mobile / 800w desktop) at parse time — before the lazy
         design chunk loads. -->
    <link
      rel="preload"
      as="image"
      href="/Mahmoud-800.webp"
      imagesrcset="/Mahmoud-400.webp 400w, /Mahmoud-800.webp 800w"
      imagesizes="(max-width: 768px) 100vw, 50vw"
      fetchpriority="high"
    />

    <!-- Fonts — loaded async so they don't block first paint -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500&display=swap"
      />
    </noscript>
